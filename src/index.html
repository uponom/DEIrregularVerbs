<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icons/icon-192.svg" />
<title>DE Irregular Verbs — Offline Trainer</title>
<style>
  :root {
    --bg: #0b0b0b;
    --card: #ffffff;
    --text: #111;
    --muted: #666;
    --border: #e5e5e5;
    --primary: #6b7280;  /* active buttons */
    --inactive: #000000; /* inactive buttons */
    --green: #16a34a;    /* "Next" button */
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji';
    background: var(--bg);
    color: var(--text);
  }
  /* Controls */
  .container { max-width: 920px; margin: 0 auto; padding: clamp(12px, 2.5vw, 24px); padding-bottom: calc(env(safe-area-inset-bottom,0) + 16px); }
  .controls { display: grid; gap: 10px; margin-bottom: 12px; }
  .controls-top { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; }
  .controls-group { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .icon-btn { min-width: 44px; text-align: center; }
  .segmented { display: inline-flex; border: 1px solid #1f2937; border-radius: 14px; overflow: hidden; background: var(--inactive); }
  .segmented button { border: 0; color: #fff; background: transparent; padding: 10px 14px; font-weight: 600; cursor: pointer; min-width: 52px; }
  .segmented button.active { background: var(--primary); }
  .segmented-wide { display: flex; width: 100%; }
  .segmented-wide button { flex: 1; text-align: center; }
  .level-filters { display: flex; flex-wrap: wrap; gap: 8px; }
  .level-row { display: flex; gap: 8px; align-items: center; }
  .level-row .level-filters { flex: 1; }
  .btn { padding: 10px 14px; border-radius: 14px; border: 1px solid #1f2937; background: var(--inactive); color: #fff; cursor: pointer; font-weight: 600; }
  .btn.active { background: var(--primary); }
  .btn-green { background: var(--green); color: #fff; border-color: var(--green); }

  /* Cards and typography */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: clamp(14px, 3vw, 18px); box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
  .label { font-size: 12px; color: var(--muted); }
  .colhdr { font-size: clamp(14px, 2vw, 18px); }
  .value-lg { font-size: clamp(28px, 8vw, 48px); line-height: 1.1; }
  .form3 { color: var(--muted); font-weight: 400; }
  .aux { color: var(--muted); font-style: italic; margin-right: 6px; }
  .invert { color: #fff; background: #000; border-radius: 12px; padding: 10px 12px; text-align: center; }
  .full-width { width: 100%; }
  .actions { display: flex; margin-top: 12px; }
  .actions-right { justify-content: flex-end; }
  .actions-between { justify-content: space-between; }
  .child-list-wrap { margin-top: 16px; border-top: 1px dashed var(--border); padding-top: 12px; }
  .child-list-title { margin: 0 0 8px; font-size: 16px; }
  .child-table { width: 100%; border-collapse: collapse; }
  .child-table th, .child-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); font-size: 20px; }
  .child-table th { text-align: left; color: var(--muted); font-size: 14px; font-weight: 600; }
  .child-cell-inf { font-weight: 700; }

  /* Learn mode */
  .flash-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .forms-header { display: flex; width: 100%; justify-content: space-between; }
  .forms-header-center { text-align: center; }
  .forms-header-right { text-align: right; }
  .forms-line { display: flex; width: 100%; }
  .forms-line-left { justify-content: flex-start; }
  .forms-line-center { justify-content: center; }
  .forms-line-right { justify-content: flex-end; }

  /* Quiz mode */
  .quiz-layout { display: grid; gap: 10px; }
  .quiz-step { margin-top: 12px; }
  .quiz-options { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 8px 0 14px; }
  @media (min-width: 560px) { .quiz-options { grid-template-columns: repeat(2, minmax(0,1fr)); } }
  @media (min-width: 880px) { .quiz-options { grid-template-columns: repeat(3, minmax(0,1fr)); } }
  .opt {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #f3f4f6;                /* light gray background */
    cursor: pointer;
    text-align: left;
    min-height: 44px;
    font-size: clamp(28px, 8vw, 48px);  /* same size as the prompt word */
    font-weight: 400;                   /* regular weight */
  }
  .opt:active { transform: translateY(1px); }
  .opt-wrong { background: #fecaca !important; border-color: #fca5a5 !important; }
  .opt-right { background: #bbf7d0 !important; border-color: #86efac !important; }
  .feedback-text { display: inline-block; font-size: 0.45em; margin-left: 8px; vertical-align: middle; }
  .step-label { color: var(--muted); font-size: clamp(14px, 4vw, 24px); }
  .answer-value { text-align: center; }
  .quiz-prompt { text-align: center; }

  /* Empty state */
  .empty-state { text-align: center; }
  .empty-title { margin: 0 0 12px; font-size: 24px; }
  .empty-body { margin: 0; color: var(--muted); }

  /* Verbs modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    z-index: 50;
  }
  .modal-dialog {
    width: min(940px, 100%);
    max-height: min(88vh, 900px);
    background: #fff;
    border-radius: 16px;
    border: 1px solid var(--border);
    display: flex;
    flex-direction: column;
  }
  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-title { margin: 0; font-size: 20px; }
  .modal-actions { display: flex; gap: 8px; }
  .modal-filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .modal-filters .btn { background: #fff; color: #111; border-color: var(--border); }
  .modal-filters .btn.active { background: #16a34a; color: #fff; border-color: #16a34a; }
  .modal-content {
    overflow: auto;
    padding: 12px 14px;
    display: grid;
    gap: 10px;
  }
  .modal-empty { margin: 6px 0; color: var(--muted); }
  .verbs-row {
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    display: grid;
    gap: 6px;
    background: #f9fafb;
  }
  .verbs-row-clickable { cursor: pointer; }
  .modal-child-wrap { margin-top: 8px; padding-top: 8px; border-top: 1px dashed #d1d5db; }
  .modal-child-table { width: 100%; border-collapse: collapse; }
  .modal-child-row td { padding: 6px 8px; border-bottom: 1px solid #e5e7eb; }
  .modal-child-inf { font-weight: 700; font-size: 18px; }
  .modal-child-tr { text-align: right; font-size: 18px; }
  .modal-child-empty { margin: 0; color: var(--muted); }
  .verbs-row-head {
    display: flex;
    align-items: baseline;
    justify-content: space-between;
    gap: 8px;
  }
  .verbs-row-inf { font-size: 20px; }
  .verbs-row-level { color: var(--muted); font-size: 13px; }
  .verbs-row-forms {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    color: #374151;
  }
  .verbs-row-pras { color: #4b5563; }
  .verbs-row-sep { color: #6b7280; }
  .verbs-row-aux { font-weight: 400; color: #4b5563; }
  .verbs-row-translation {
    border-top: 1px dashed #d1d5db;
    padding-top: 6px;
    font-size: 20px;
    font-weight: 700;
    text-align: right;
  }

  /* TTS info */
  .tts-info { max-width: 920px; margin: 10px auto 24px; padding: 0 16px; }
  .tts-info .tiny { color: var(--muted); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="controls">
    <div class="controls-top">
      <div class="controls-group">
        <div class="segmented" id="langGroup" role="group" aria-label="Language">
          <button type="button" data-lang="EN">EN</button>
          <button type="button" data-lang="UA">UA</button>
          <button type="button" data-lang="RU" class="active">RU</button>
        </div>
        <button type="button" id="ttsToggleBtn" class="btn icon-btn" aria-label="Toggle speech" title="Toggle speech">🔇</button>
        <button type="button" id="openVerbsBtn" class="btn icon-btn" aria-label="Open verbs list" title="Open verbs list">📚</button>
      </div>
    </div>
    <div class="level-row">
      <div id="levelFilters" class="level-filters" role="group" aria-label="Level filters"></div>
      <button type="button" id="parentOnlyBtn" class="btn icon-btn" aria-label="Toggle Parent-Children mode" title="Toggle Parent-Children mode">🌱</button>
    </div>
    <div id="modeGroup" class="segmented segmented-wide" role="group" aria-label="Mode">
      <button type="button" id="modeLearn" class="active">Learn</button>
      <button type="button" id="modeQuiz">Quiz</button>
    </div>
  </div>

  <main id="main"></main>
</div>
<div id="verbsModalRoot"></div>

<!-- Current TTS info -->
<div class="tts-info"><div id="ttsInfo" class="tiny">TTS: —</div></div>

<script src="./data/verbs.js"></script>
<script src="./data/verb-schema.js"></script>
<script src="./quiz-logic.js"></script>
<script src="./verbs-list.js"></script>
<script src="./app-version.js"></script>
<script src="./pwa.js"></script>
<script type="module" src="./index.js"></script>
</body>
</html>
