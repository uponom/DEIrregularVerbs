<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0b0b0b" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<link rel="manifest" href="./manifest.webmanifest" />
<link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
<link rel="apple-touch-icon" href="./icons/icon-192.svg" />
<title>DE Irregular Verbs — Offline Trainer</title>
<style>
  :root {
    --bg: #0b0b0b;
    --card: #ffffff;
    --text: #111;
    --muted: #666;
    --border: #e5e5e5;
    --primary: #ffffff;  /* active buttons */
    --inactive: #9aa0a6; /* inactive buttons */
    --green: #16a34a;    /* "Next" button */
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Ubuntu, 'Helvetica Neue', Arial, 'Noto Sans', 'Apple Color Emoji', 'Segoe UI Emoji';
    background: var(--bg);
    color: var(--text);
  }
  .container { max-width: 920px; margin: 0 auto; padding: clamp(12px, 2.5vw, 24px); padding-bottom: calc(env(safe-area-inset-bottom,0) + 16px); }
  .controls { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .left, .right { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }

  /* Language switcher: segmented buttons */
  .segmented { display: inline-flex; border: 1px solid var(--border); border-radius: 14px; overflow: hidden; background: var(--inactive); }
  .segmented button { border: 0; background: transparent; padding: 10px 14px; font-weight: 600; cursor: pointer; min-width: 52px; }
  .segmented button.active { background: var(--primary); }

  /* Mode buttons */
  .btn { padding: 10px 14px; border-radius: 14px; border: 1px solid var(--border); background: var(--inactive); cursor: pointer; font-weight: 600; }
  .btn.active { background: var(--primary); }
  .btn-green { background: var(--green); color: #fff; border-color: var(--green); }

  /* Card */
  .card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: clamp(14px, 3vw, 18px); box-shadow: 0 4px 16px rgba(0,0,0,0.05); }
  .label { font-size: 12px; color: var(--muted); }
  .colhdr { font-size: clamp(14px, 2vw, 18px); }
  .value-lg { font-size: clamp(28px, 8vw, 48px); line-height: 1.1; }
  .value-md { font-size: clamp(20px, 6vw, 32px); line-height: 1.15; }
  .form3 { color: var(--muted); font-weight: 400; } /* 3rd person singular in muted regular style */
  .aux { color: var(--muted); font-style: italic; margin-right: 6px; } /* haben/sein always muted and italic */
  .muted { color: var(--muted); }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .spacer { height: 8px; }
  .gap-block { height: 16px; } /* empty row between quiz blocks */

  /* Quiz option buttons */
  .options { display: grid; grid-template-columns: 1fr; gap: 8px; margin: 8px 0 14px; }
  @media (min-width: 560px) { .options { grid-template-columns: repeat(2, minmax(0,1fr)); } }
  @media (min-width: 880px) { .options { grid-template-columns: repeat(3, minmax(0,1fr)); } }
  .opt {
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: #f3f4f6;                /* light gray background */
    cursor: pointer;
    text-align: left;
    min-height: 44px;
    font-size: clamp(28px, 8vw, 48px);  /* same size as the prompt word */
    font-weight: 400;                   /* regular weight */
  }
  .opt:active { transform: translateY(1px); }
  .opt-wrong { background: #fecaca !important; border-color: #fca5a5 !important; }
  .opt-right { background: #bbf7d0 !important; border-color: #86efac !important; }

  .step-label { color: var(--muted); font-size: clamp(14px, 4vw, 24px); } /* around 2x smaller than option text */

  .flash { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .line { display: flex; width: 100%; }
  .left { justify-content: flex-start; }
  .center { justify-content: center; }
  .right { justify-content: flex-end; }
  .invert { color: #fff; background: #000; border-radius: 12px; padding: 10px 12px; text-align: center; }

  /* Bottom section: TTS info */
  .tts-info { max-width: 920px; margin: 10px auto 24px; padding: 0 16px; }
  .tts-info .tiny { color: var(--muted); font-size: 12px; text-align: center; }
</style>
</head>
<body>
<div class="container">
  <div class="controls">
    <div class="left">
      <div class="segmented" id="langGroup">
        <button data-lang="EN">EN</button>
        <button data-lang="UA">UA</button>
        <button data-lang="RU" class="active">RU</button>
      </div>
      <label class="row" style="gap:6px;">
        <input id="ttsToggle" type="checkbox" />
        <span class="label">Озвучка (de-DE)</span>
      </label>
    </div>
    <div class="right">
      <button id="modeLearn" class="btn active">Обучение</button>
      <button id="modeQuiz" class="btn">Проверка</button>
    </div>
  </div>

  <main id="main"></main>
</div>

<!-- Current TTS info -->
<div class="tts-info"><div id="ttsInfo" class="tiny">TTS: —</div></div>

<script src="./data/verbs.js"></script>
<script src="./app-version.js"></script>
<script src="./pwa.js"></script>
<script>
const VERBS = Array.isArray(window.VERBS) ? window.VERBS : [];

/* ====== State and helpers ====== */
let STATE = { mode:'learn', uiLang:'RU', tts:false, index:0, voices:[], deVoice:null, q:null };
function shuffle(arr){ const a=arr.slice(); for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
const ITEMS = shuffle(VERBS.map(v=>({ ru:v.RU, ua:v.UA, en:v.EN, de:v.Infinitiv, pras:v.Praesens3, pret:v.Praeteritum, part2:v.Partizip2, aux:v.AuxVerb }))).filter(x=>x.de&&(x.ru||x.ua||x.en));
function tr(it){ return STATE.uiLang==='RU'? it.ru : STATE.uiLang==='UA'? it.ua : it.en; }

/* ====== Voice handling (offline-safe) ====== */
function pickGermanVoice(){
  try{
    const list = window.speechSynthesis?.getVoices?.() || [];
    STATE.voices = list;
    let v = list.find(v=>/de-DE/i.test(v.lang)) || list.find(v=>/^de[-_]/i.test(v.lang));
    if(!v){
      const prefs=[/Microsoft (Katja|Conrad|Stefan)/i,/Google Deutsch/i,/German \(Germany\)/i,/Anna|Petra|Markus|Vicki/i];
      for(const rx of prefs){ v=list.find(voice=>rx.test(voice.name)); if(v) break; }
    }
    STATE.deVoice = v || null;
  }catch(e){ STATE.deVoice=null; }
  renderTtsInfo();
}

/* Single utterance for minimal pauses */
const TTS_RATE = 0.95, TTS_PITCH = 1.0;
function speakSequence(parts){
  if(!STATE.tts) return;
  try{
    if(!('speechSynthesis' in window) || !window.SpeechSynthesisUtterance) return;
    const text = (parts||[]).filter(Boolean).join(' ');
    if(!text) return;
    window.speechSynthesis.cancel();
    const u=new SpeechSynthesisUtterance(text);
    u.lang='de-DE';
    if(STATE.deVoice) u.voice=STATE.deVoice;
    u.rate=TTS_RATE; u.pitch=TTS_PITCH;
    window.speechSynthesis.speak(u);
  }catch(e){ /* ignore */ }
}

/* ====== TTS info at the bottom ====== */
function renderTtsInfo(){
  const el = document.getElementById('ttsInfo');
  const haveAPI = 'speechSynthesis' in window && window.SpeechSynthesisUtterance;
  const voice = STATE.deVoice;
  const version = window.APP_VERSION || 'dev';
  const parts = [
    `Version: ${version}`,
    `Движок: ${haveAPI ? 'Web Speech API' : '—'}`,
    `Включено: ${STATE.tts ? 'да' : 'нет'}`,
    `Голос: ${voice ? (voice.name + ' (' + (voice.lang||'') + ')') : '—'}`,
    `Скорость: ${TTS_RATE}`,
    `Тембр: ${TTS_PITCH}`
  ];
  el.textContent = parts.join(' · ');
}

/* ====== Rendering ====== */
const main = document.getElementById('main');
function render(){ if(STATE.mode==='learn') renderLearn(); else renderQuiz(); }

/* === LEARN MODE === */
function renderLearn(){
  const it = ITEMS[STATE.index];
  const root = document.createElement('div');
  root.className = 'card';
  root.innerHTML = `
    <div class="flash">
      <div class="line" style="justify-content: space-between;">
        <div class="label colhdr" style="text-align:left;">Infinitiv/Präsens</div>
        <div class="label colhdr" style="text-align:center;">Präteritum</div>
        <div class="label colhdr" style="text-align:right;">Partizip II</div>
      </div>
      <div class="line left">
        <div class="value-lg"><strong>${it.de ?? ''}</strong> ${it.pras ? `<span class="form3">(${it.pras})</span>` : ''}</div>
      </div>
      <div class="line center"><div class="value-lg"><strong>${it.pret ?? ''}</strong></div></div>
      <div class="line right"><div class="value-lg"><span class="aux">${it.aux ? it.aux : ''}</span><strong>${it.part2 ?? ''}</strong></div></div>
      <div class="line"><div class="invert value-lg" style="width:100%">${tr(it) ?? ''}</div></div>
    </div>
    <div class="row" style="margin-top:12px; justify-content: flex-end;">
      <button id="nextBtn" class="btn btn-green">Дальше →</button>
    </div>`;
  main.replaceChildren(root);
  document.getElementById('nextBtn').onclick = () => { STATE.index = (STATE.index + 1) % ITEMS.length; render(); };
  if(STATE.tts){ speakSequence([it.de, it.pret, it.part2]); }
}

/* Smart options: prefer same first letter, then any others (5+1 total) */
function makeSmartOptions(key, correctItem, count=5) {
  const correct = correctItem[key];
  const allVals = Array.from(new Set(ITEMS.map(x=>x[key]).filter(v => v && v !== correct)));
  const first = (correct || '').charAt(0).toLowerCase();
  const same = allVals.filter(v => v.charAt(0).toLowerCase() === first);
  const rest = allVals.filter(v => v.charAt(0).toLowerCase() !== first);
  const picks = [...shuffle(same).slice(0, count), ...shuffle(rest)].slice(0, count);
  return shuffle([correct, ...picks]);
}

/* === QUIZ MODE === */
function renderQuiz(){
  if (!STATE.q) STATE.q = { de:null, pret:null, p2:null };

  const it = ITEMS[STATE.index];
  const root = document.createElement('div');
  root.className = 'card';

  // Top prompt: translation with inverted colors
  const prompt = `<div class="invert value-lg" style="width:100%; text-align:center;">${tr(it) ?? ''}</div>`;

  root.innerHTML = `
    <div class="grid" style="gap: 10px;">
      ${prompt}
      <div id="ansDe"></div>
      <div id="ansPret"></div>
      <div id="ansP2"></div>
      <div class="row" style="margin-top:4px; justify-content: flex-end;">
        <button id="nextQ" class="btn btn-green">Дальше →</button>
      </div>
    </div>
  `;
  main.replaceChildren(root);

  function gap() { const d=document.createElement('div'); d.className='gap-block'; return d; }

  // 1) Infinitive
  const ansDe = document.getElementById('ansDe');
  if (STATE.q.de) {
    ansDe.innerHTML = `<div class="value-lg" style="text-align:center;"><strong>${STATE.q.de}</strong></div>`;
  } else {
    const opts = makeSmartOptions('de', it, 5);
    const wrap = document.createElement('div');
    const label = document.createElement('div'); label.className = 'step-label'; label.textContent = 'Infinitiv';
    wrap.className = 'options';
    opts.forEach(val => {
      const b = document.createElement('button');
      b.className = 'opt';
      b.textContent = val;
      b.onclick = () => {
        if (val === it.de) {
          b.classList.add('opt-right');
          STATE.q.de = val;
          speakSequence([val]);              // speak the correct infinitive
          setTimeout(render, 200);
        } else {
          b.classList.add('opt-wrong');
        }
      };
      wrap.appendChild(b);
    });
    ansDe.replaceChildren(gap(), label, wrap);
  }

  // 2) Präteritum after a correct infinitive
  const ansPret = document.getElementById('ansPret');
  if (STATE.q.de) {
    if (STATE.q.pret) {
      ansPret.innerHTML = `<div class="value-lg" style="text-align:center;"><strong>${STATE.q.pret}</strong></div>`;
    } else {
      const opts = makeSmartOptions('pret', it, 5).filter(Boolean);
      const wrap = document.createElement('div');
      const label = document.createElement('div'); label.className = 'step-label'; label.textContent = 'Präteritum';
      wrap.className = 'options';
      opts.forEach(val => {
        const b = document.createElement('button');
        b.className = 'opt';
        b.textContent = val;
        b.onclick = () => {
          if (val === it.pret) {
            b.classList.add('opt-right');
            STATE.q.pret = val;
            speakSequence([val]);            // speak the correct Präteritum
            setTimeout(render, 200);
          } else {
            b.classList.add('opt-wrong');
          }
        };
        wrap.appendChild(b);
      });
      ansPret.replaceChildren(gap(), label, wrap);
    }
  }

  // 3) Partizip II after a correct Präteritum
  const ansP2 = document.getElementById('ansP2');
  if (STATE.q.de && STATE.q.pret) {
    if (STATE.q.p2) {
      ansP2.innerHTML = `<div class="value-lg" style="text-align:center;"><span class="aux">${it.aux ? it.aux + ' ' : ''}</span><strong>${STATE.q.p2}</strong></div>`;
    } else {
      const opts = makeSmartOptions('part2', it, 5).filter(Boolean);
      const wrap = document.createElement('div');
      const label = document.createElement('div'); label.className = 'step-label'; label.textContent = 'Partizip II';
      wrap.className = 'options';
      opts.forEach(val => {
        const b = document.createElement('button');
        b.className = 'opt';
        b.textContent = val;
        b.onclick = () => {
          if (val === it.part2) {
            b.classList.add('opt-right');
            STATE.q.p2 = val;
            // all three forms are selected: speak all three
            speakSequence([it.de, it.pret, it.part2]);
            setTimeout(render, 200);
          } else {
            b.classList.add('opt-wrong');
          }
        };
        wrap.appendChild(b);
      });
      ansP2.replaceChildren(gap(), label, wrap);
    }
  }

  // Next
  document.getElementById('nextQ').onclick = () => {
    STATE.index = (STATE.index + 1) % ITEMS.length;
    STATE.q = { de:null, pret:null, p2:null };
    render();
  };
}

/* ====== Event handlers ====== */
document.querySelector('#langGroup').onclick = (e)=>{
  const btn = e.target.closest('button'); if(!btn) return;
  document.querySelectorAll('#langGroup button').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  STATE.uiLang = btn.getAttribute('data-lang');
  render();
};
document.querySelector('#modeLearn').onclick = ()=>{
  STATE.mode='learn';
  document.querySelector('#modeLearn').classList.add('active');
  document.querySelector('#modeQuiz').classList.remove('active');
  render();
};
document.querySelector('#modeQuiz').onclick = ()=>{
  STATE.mode='quiz';
  document.querySelector('#modeQuiz').classList.add('active');
  document.querySelector('#modeLearn').classList.remove('active');
  STATE.q = { de:null, pret:null, p2:null }; // reset quiz progress
  render();
};
document.querySelector('#ttsToggle').onchange = (e)=>{ STATE.tts = e.target.checked; renderTtsInfo(); render(); };

/* ====== Voice init ====== */
pickGermanVoice();
if('speechSynthesis' in window){
  try{
    window.speechSynthesis.onvoiceschanged = pickGermanVoice;
    setTimeout(pickGermanVoice, 300);
    setTimeout(pickGermanVoice, 1200);
  }catch(e){}
}

/* ====== App start ====== */
renderTtsInfo();
render();

if (window.PWA) {
  window.PWA.init({ swPath: './sw.js' }).catch(() => {});
}
</script>
</body>
</html>
